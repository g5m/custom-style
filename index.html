<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Style | Loja Virtual</title>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="loader">
    <h1>Carregando...</h1>
  </div>

  <div class="login" id="loginScreen">
    <div class="login-box">
      <img src="logo.png" alt="Logo" class="logo" style="margin-bottom: 20px;" onerror="this.style.display='none'">
      <h2>Bem-vindo(a)</h2>
      <p style="color: #aaa; margin-bottom: 30px;">Faça login para acessar a loja</p>
      <button onclick="entrarNaLoja()">Entrar na Loja</button>
    </div>
  </div>

  <div id="mainContent" style="display: none;">
    <header>
      <img src="logo.png" alt="Logo" class="logo" onerror="this.src='https://via.placeholder.com/120x40?text=LOGO'">
      <nav>
        <a href="#" onclick="abrirCheckout()">🛒 Carrinho (<span id="cart-badge">0</span>)</a>
      </nav>
    </header>

    <section class="hero">
      <h1>A nova coleção chegou. <br><span>Seja exclusivo.</span></h1>
      <p style="color: #aaa; margin-top: 10px;">Streetwear minimalista para quem vive o estilo.</p>
    </section>

    <div class="products" id="products"></div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content" style="max-width: 350px;">
      <img id="modalImg" src="" alt="Produto" style="width: 100%; border-radius: 10px; margin-bottom: 15px;">
      <h2 id="modalNome"></h2>
      <p id="modalPreco" style="font-size: 1.5rem; font-weight: bold; margin: 15px 0; color: #b5e3d8;"></p>
      <button style="width: 100%; margin-bottom: 15px;" onclick="addCarrinhoModal()">Adicionar ao Carrinho</button>
      <a href="#" onclick="fecharModal()" style="color: #aaa; text-decoration: none; font-size: 0.9rem;">Voltar</a>
    </div>
  </div>

  <div class="checkout" id="checkout">
    <div class="checkout-box" style="width: 90%; max-width: 400px;">
      <h2 style="margin-bottom: 20px;">Seu Carrinho</h2>
      <ul id="listaCarrinho" style="list-style: none; padding: 0; text-align: left; margin-bottom: 20px; max-height: 250px; overflow-y: auto;">
        </ul>
      <h3 id="total" style="margin-bottom: 20px; color: #b5e3d8;">Total: R$ 0,00</h3>
      <button style="width: 100%; margin-bottom: 15px;" onclick="finalizarCompra()">Finalizar Pedido</button>
      <a href="#" onclick="fecharCheckout()" style="color: #aaa; text-decoration: none; font-size: 0.9rem;">Continuar Comprando</a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
