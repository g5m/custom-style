<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Style | Loja Virtual</title>
  
  <style>
    /* === SEU CSS AQUI DENTRO === */
    :root {
      --bg-dark: #0d0d0d;
      --bg-card: #1a1a1a;
      --bg-box: #111111;
      --text-main: #ffffff;
      --text-muted: #aaaaaa;
      --gradient-pastel: linear-gradient(90deg, #f8c8dc, #b5e3d8);
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
      overflow-x: hidden;
    }

    /* Textos e Botões */
    #loader h1, .hero span {
      background: var(--gradient-pastel);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: var(--gradient-pastel);
      color: var(--bg-dark);
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      width: 100%;
    }

    button:hover { transform: scale(1.05); filter: brightness(1.1); }

    /* Layout */
    header { display: flex; justify-content: space-between; align-items: center; padding: 20px; }
    .logo { width: 120px; }
    nav a { color: var(--text-muted); margin: 0 10px; text-decoration: none; font-weight: bold; }
    nav a:hover { color: var(--text-main); }
    .hero { text-align: center; padding: 60px 20px; }

    /* Produtos */
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 40px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: var(--bg-card);
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    .card img { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; }
    .card p { color: #b5e3d8; font-weight: bold; font-size: 1.2rem; margin-top: 10px; }

    /* Telas de Sobreposição (NUNCA mostram a menos que o JS mande) */
    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center;
    }

    #loader { background: var(--bg-dark); z-index: 9999; }
    #loginScreen { background: var(--bg-dark); z-index: 9000; }
    #modal, #checkout { background: rgba(0,0,0,0.9); z-index: 9500; display: none; }

    .box {
      background: var(--bg-box);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      width: 90%;
      max-width: 350px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.8);
    }

    .cart-item { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
  </style>
</head>
<body>

  <div id="loader" class="overlay">
    <h1>Carregando...</h1>
  </div>

  <div id="loginScreen" class="overlay">
    <div class="box">
      <img src="logo.png" alt="Custom Style" class="logo" style="margin-bottom: 20px;" onerror="this.style.display='none'">
      <h2>Bem-vindo(a)</h2>
      <p style="color: #aaa; margin-bottom: 30px;">Faça login para acessar a loja</p>
      <button onclick="entrarNaLoja()">Entrar na Loja</button>
    </div>
  </div>

  <div id="mainContent" style="display: none;">
    <header>
      <img src="logo.png" alt="Logo" class="logo" onerror="this.src='https://via.placeholder.com/120x40?text=LOGO'">
      <nav>
        <a href="#" onclick="abrirCheckout()">🛒 Carrinho (<span id="cart-badge">0</span>)</a>
      </nav>
    </header>

    <section class="hero">
      <h1 style="font-size: 2.5rem; margin-bottom: 10px;">A nova coleção chegou. <br><span>Seja exclusivo.</span></h1>
      <p style="color: #aaa; font-size: 1.1rem;">Streetwear minimalista para quem vive o estilo.</p>
    </section>

    <div class="products" id="products"></div>
  </div>

  <div id="modal" class="overlay">
    <div class="box">
      <img id="modalImg" src="" alt="Produto" style="width: 100%; border-radius: 10px; margin-bottom: 15px; height: 250px; object-fit: cover;">
      <h2 id="modalNome" style="margin-bottom: 5px;"></h2>
      <p id="modalPreco" style="font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; color: #b5e3d8;"></p>
      <button style="margin-bottom: 15px;" onclick="addCarrinho()">Adicionar ao Carrinho</button>
      <a href="#" onclick="fecharModal()" style="color: #aaa; text-decoration: none;">Voltar para loja</a>
    </div>
  </div>

  <div id="checkout" class="overlay">
    <div class="box" style="max-width: 450px;">
      <h2 style="margin-bottom: 20px;">Seu Carrinho</h2>
      <ul id="listaCarrinho" style="list-style: none; padding: 0; text-align: left; max-height: 200px; overflow-y: auto;"></ul>
      <h3 id="total" style="margin: 20px 0; color: #b5e3d8; font-size: 1.3rem;">Total: R$ 0,00</h3>
      <button style="margin-bottom: 15px;" onclick="finalizarCompra()">Finalizar Pedido via WhatsApp</button>
      <a href="#" onclick="fecharCheckout()" style="color: #aaa; text-decoration: none;">Continuar Comprando</a>
    </div>
  </div>
