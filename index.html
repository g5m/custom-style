<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Style</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --grad-1:#f7f7fb;
      --grad-2:#f0f4ff;
      --grad-3:#f7f0ff;
      --accent:#111;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to bottom, var(--grad-1), var(--grad-2), var(--grad-3));
      min-height:100vh;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(10px);
      position: sticky;
      top:0;
      z-index:10;
    }

    .logo img {
      width: 200px;
    }

    .cart-btn {
      cursor: pointer;
      font-weight: bold;
    }

    h1 {
      text-align: center;
      font-family: 'Poppins', sans-serif;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .product {
      background: white;
      padding: 15px;
      border-radius: 15px;
      text-align: center;
      transition: 0.3s;
      cursor: pointer;
    }

    .product:hover {
      transform: scale(1.05);
    }

    .product img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      background: black;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      transition:0.2s;
    }

    button:hover{
      transform: scale(1.05);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
    }

    .modal-content {
      background: white;
      padding: 20px;
      margin: 10% auto;
      width: 300px;
      border-radius: 15px;
      text-align: center;
    }

    .close {
      cursor: pointer;
      float: right;
      font-size: 20px;
    }

    /* Cart */
    .cart {
      position: fixed;
      right: 0;
      top: 0;
      width: 320px;
      height: 100%;
      background: white;
      box-shadow: -2px 0 10px rgba(0,0,0,0.1);
      padding: 20px;
      display: none;
      overflow:auto;
    }

    .cart button{
      width:100%;
    }

  </style>
</head>
<body>

<header>
  <div class="logo">
    <img src="logo.png">
  </div>
  <div class="cart-btn" onclick="abrirCarrinho()">🛒 Carrinho</div>
</header>

<h1>Custom Style</h1>
<p style="text-align:center; opacity:0.6;">Streetwear minimalista para quem vive o estilo.</p>

<div class="products" id="products"></div>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="fecharModal()">&times;</span>
    <img id="modalImg">
    <h2 id="modalNome"></h2>
    <p id="modalPreco"></p>
    <button onclick="addCarrinhoModal()">Adicionar ao Carrinho</button>
  </div>
</div>

<!-- Cart -->
<div class="cart" id="cart">
  <h2>Carrinho</h2>
  <ul id="listaCarrinho"></ul>
  <p id="total"></p>
  <button onclick="finalizarCompra()">Finalizar Compra</button>
  <button onclick="abrirCarrinho()">Fechar</button>
</div>

<script>
  const produtos = [
    {nome: "Oversized Black", img: "https://via.placeholder.com/300", preco: 120},
    {nome: "Oversized White", img: "https://via.placeholder.com/300", preco: 90},
    {nome: "Street Basic", img: "https://via.placeholder.com/300", preco: 80},
    {nome: "Urban Fit", img: "https://via.placeholder.com/300", preco: 140},
    {nome: "Classic Tee", img: "https://via.placeholder.com/300", preco: 70},
    {nome: "Minimal Shirt", img: "https://via.placeholder.com/300", preco: 110},
    {nome: "Loose Style", img: "https://via.placeholder.com/300", preco: 130},
    {nome: "Soft Wear", img: "https://via.placeholder.com/300", preco: 100},
    {nome: "Modern Fit", img: "https://via.placeholder.com/300", preco: 95}
  ];

  let carrinho = [];
  let produtoAtual = null;

  function renderProdutos() {
    const container = document.getElementById("products");
    produtos.forEach(p => {
      container.innerHTML += `
        <div class="product" onclick="abrirProduto('${p.nome}', '${p.img}', ${p.preco})">
          <img src="${p.img}">
          <h3>${p.nome}</h3>
          <p>R$ ${p.preco}</p>
        </div>
      `;
    });
  }

  function abrirProduto(nome, img, preco) {
    produtoAtual = {nome, preco};
    document.getElementById("modal").style.display = "block";
    document.getElementById("modalNome").innerText = nome;
    document.getElementById("modalImg").src = img;
    document.getElementById("modalPreco").innerText = "R$ " + preco;
  }

  function fecharModal() {
    document.getElementById("modal").style.display = "none";
  }

  function addCarrinhoModal() {
    carrinho.push(produtoAtual);
    atualizarCarrinho();
    fecharModal();
  }

  function atualizarCarrinho() {
    const lista = document.getElementById("listaCarrinho");
    const total = document.getElementById("total");
    lista.innerHTML = "";
    let soma = 0;

    carrinho.forEach(item => {
      lista.innerHTML += `<li>${item.nome} - R$ ${item.preco}</li>`;
      soma += item.preco;
    });

    total.innerText = "Total: R$ " + soma;
  }

  function abrirCarrinho() {
    const cart = document.getElementById("cart");
    cart.style.display = cart.style.display === "block" ? "none" : "block";
  }

  function finalizarCompra() {
    alert("Pagamento aprovado! (simulação)\n\nMétodos: Pix, Crédito ou Débito");
    carrinho = [];
    atualizarCarrinho();
  }

  renderProdutos();
</script>

</body>
</html>
