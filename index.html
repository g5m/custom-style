<div class="modal" id="modal" style="display: none;">
    <div class="modal-content" style="max-width: 350px;">
      <img id="modalImg" src="" alt="Produto" style="width: 100%; border-radius: 10px; margin-bottom: 15px;">
      <h2 id="modalNome"></h2>
      <p id="modalPreco" style="font-size: 1.5rem; font-weight: bold; margin: 15px 0; color: #b5e3d8;"></p>
      <button style="width: 100%; margin-bottom: 15px;" onclick="addCarrinhoModal()">Adicionar ao Carrinho</button>
      <a href="#" onclick="fecharModal()" style="color: #aaa; text-decoration: none; font-size: 0.9rem;">Voltar</a>
    </div>
  </div>

  <div class="checkout" id="checkout" style="display: none;">
    <div class="checkout-box" style="width: 90%; max-width: 400px;">
      <h2 style="margin-bottom: 20px;">Seu Carrinho</h2>
      <ul id="listaCarrinho" style="list-style: none; padding: 0; text-align: left; margin-bottom: 20px; max-height: 250px; overflow-y: auto;">
        </ul>
      <h3 id="total" style="margin-bottom: 20px; color: #b5e3d8;">Total: R$ 0,00</h3>
      <button style="width: 100%; margin-bottom: 15px;" onclick="finalizarCompra()">Finalizar Pedido</button>
      <a href="#" onclick="fecharCheckout()" style="color: #aaa; text-decoration: none; font-size: 0.9rem;">Continuar Comprando</a>
    </div>
  </div>
